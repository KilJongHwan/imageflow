version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: imageflow
      POSTGRES_USER: imageflow
      POSTGRES_PASSWORD: imageflow1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  image-agent:
    build:
      context: ./image-agent
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IMAGE_JOB_QUEUE_KEY: imageflow:image-jobs
      BACKEND_BASE_URL: http://host.docker.internal:8080
      R2_PUBLIC_BASE_URL: https://example-r2-public-url.invalid
    depends_on:
      - redis

volumes:
  postgres_data:
