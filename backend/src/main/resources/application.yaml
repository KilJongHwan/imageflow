spring:
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:12MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:48MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:imageflow}}
    username: ${DB_USERNAME:imageflow}
    password: ${DB_PASSWORD:imageflow1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    # 요청 단위 correlation id(CorrelationIdFilter가 설정)를 모든 로그 라인에 넣는다.
    # 레벨 슬롯에 얹어서 Spring Boot 기본 콘솔 패턴의 나머지는 그대로 유지한다.
    level: "%5p [corrId=%X{corrId:-}]"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  auth:
    jwt:
      secret: ${JWT_SECRET:change-this-demo-jwt-secret-key-at-least-32chars}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:604800}
    mail:
      from: ${APP_AUTH_MAIL_FROM:no-reply@imageflow.local}
      verification-base-url: ${APP_AUTH_MAIL_VERIFICATION_BASE_URL:http://localhost:8080}
    master:
      email: ${APP_MASTER_EMAIL:imageflowmaster@master}
      password: ${APP_MASTER_PASSWORD:imageflow123!}
    social:
      google:
        auth-url: ${APP_AUTH_SOCIAL_GOOGLE_AUTH_URL:}
      naver:
        auth-url: ${APP_AUTH_SOCIAL_NAVER_AUTH_URL:}
  processing:
    mode: ${APP_PROCESSING_MODE:worker}
  queue:
    enabled: ${APP_QUEUE_ENABLED:true}
    image-jobs-key: ${APP_QUEUE_IMAGE_JOBS_KEY:imageflow:image-jobs}
    retry-attempts: ${APP_QUEUE_RETRY_ATTEMPTS:3}
    retry-delay-millis: ${APP_QUEUE_RETRY_DELAY_MILLIS:200}
    max-backlog-depth: ${APP_QUEUE_MAX_BACKLOG_DEPTH:100}
    outbox:
      poll-interval-millis: ${APP_QUEUE_OUTBOX_POLL_INTERVAL_MILLIS:1000}
      batch-size: ${APP_QUEUE_OUTBOX_BATCH_SIZE:20}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
    root: ${APP_STORAGE_ROOT:../storage}
  upload:
    max-batch-size: ${APP_UPLOAD_MAX_BATCH_SIZE:10}
    # 업로드는 워커로 넘기기 전에 힙에 버퍼링되므로, 이 한도는 디스크 용량이 아니라
    # 512MB 무료 인스턴스(기본 힙 ~128MB)에 맞춰 잡는다.
    max-file-bytes: ${APP_UPLOAD_MAX_FILE_BYTES:10485760}
    max-total-bytes: ${APP_UPLOAD_MAX_TOTAL_BYTES:41943040}
    max-image-pixels: ${APP_UPLOAD_MAX_IMAGE_PIXELS:30000000}
    max-zip-entry-count: ${APP_UPLOAD_MAX_ZIP_ENTRY_COUNT:32}
    max-zip-entry-bytes: ${APP_UPLOAD_MAX_ZIP_ENTRY_BYTES:10485760}
    max-zip-total-bytes: ${APP_UPLOAD_MAX_ZIP_TOTAL_BYTES:41943040}
  rate-limit:
    upload-requests-per-minute: ${APP_RATE_LIMIT_UPLOAD_REQUESTS_PER_MINUTE:30}
