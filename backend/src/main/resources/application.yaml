spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://localhost:5432/imageflow
    username: imageflow
    password: imageflow1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

app:
  public-base-url: http://localhost:8080
  auth:
    jwt:
      secret: change-this-demo-jwt-secret-key-at-least-32chars
      expiration-seconds: 604800
  processing:
    mode: sync
  queue:
    enabled: false
    image-jobs-key: imageflow:image-jobs
  storage:
    root: ../storage
  upload:
    max-batch-size: 10
