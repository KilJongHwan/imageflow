spring:
  datasource:
    url: jdbc:h2:mem:imageflow-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 0

app:
  auth:
    jwt:
      secret: test-jwt-secret-key-for-imageflow-32chars
  upload:
    max-batch-size: 10
    max-zip-entry-count: 3
    max-zip-entry-bytes: 4096
    max-zip-total-bytes: 8192
  queue:
    enabled: true
