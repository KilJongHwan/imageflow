name: Keep Render Backend Awake

# 무료 Render Web Service는 15분 미사용 시 슬립에 들어갑니다.
# 이 워크플로우가 활동 시간대에만 주기적으로 /api/health 를 호출해 서버를 깨워둡니다.
# (프론트/브라우저와 무관하게 GitHub 인프라가 무인으로 실행합니다.)
#
# 시간대 메모:
# - GitHub Actions cron 은 UTC 기준입니다.
# - 00:00-14:59 UTC = 09:00-23:59 KST 구간에만 핑을 보냅니다.
# - 새벽(한국 기준)에는 핑을 멈춰 Render 무료 월 750시간 한도를 아낍니다.
#   이 시간대 방문자는 프론트의 "서버 깨우는 중" 폴백 화면으로 처리됩니다.
#
# 주의:
# - GitHub 의 scheduled workflow 는 best-effort 라 수 분 지연될 수 있습니다.
# - 기본 브랜치에 60일간 커밋이 없으면 schedule 이 자동 비활성화됩니다.

on:
  schedule:
    - cron: "*/10 0-14 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: https://imageflow-backend-yol7.onrender.com/api/health
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$HEALTH_URL" || true)
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend is awake"
              exit 0
            fi
            sleep 20
          done
          # 콜드스타트가 길어질 수 있으므로 실패로 처리하지 않고 종료합니다.
          echo "backend did not return 200 within retries (likely still cold-starting)"
          exit 0
