services:
  - type: web
    name: imageflow-backend
    runtime: docker
    rootDir: .
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: DB_HOST
        fromDatabase:
          name: imageflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: imageflow-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: imageflow-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: imageflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: imageflow-db
          property: password
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: imageflow-queue
          property: connectionString
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_STORAGE_ROOT
        value: /tmp/imageflow-storage
      - key: APP_PROCESSING_MODE
        value: worker
      - key: APP_QUEUE_ENABLED
        value: "true"

  - type: worker
    name: imageflow-worker
    runtime: docker
    rootDir: .
    plan: starter
    dockerfilePath: image-agent/Dockerfile
    dockerContext: image-agent
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: imageflow-queue
          property: connectionString
      - key: IMAGE_JOB_QUEUE_KEY
        value: imageflow:image-jobs
      - key: BACKEND_HOSTPORT
        fromService:
          type: web
          name: imageflow-backend
          property: hostport
      - key: WORKER_CONCURRENCY
        value: "3"
      - key: WORKER_RESULT_CALLBACK_ENABLED
        value: "true"

  - type: keyvalue
    name: imageflow-queue
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: imageflow-db
    plan: free
