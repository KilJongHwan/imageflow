services:
  - type: web
    name: imageflow-backend
    runtime: docker
    rootDir: .
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: DB_HOST
        fromDatabase:
          name: imageflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: imageflow-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: imageflow-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: imageflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: imageflow-db
          property: password
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_STORAGE_ROOT
        value: /tmp/imageflow-storage
      - key: APP_PROCESSING_MODE
        value: sync
      - key: APP_QUEUE_ENABLED
        value: "false"
      - key: SPRING_AUTOCONFIGURE_EXCLUDE
        value: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

databases:
  - name: imageflow-db
    plan: free
